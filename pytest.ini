[pytest]
# ─────────────────────────────────────────────────────────────
# pytest configuration
# TEMPLATE NOTE: This file lives at the project root (same level as src/ and tests/)
# ─────────────────────────────────────────────────────────────

# Tell pytest where to find tests — avoids scanning your entire project
testpaths = tests

# Auto-handle async test functions (required for async FastAPI endpoints)
asyncio_mode = auto

# ─────────────────────────────────────────────────────────────
# MARKERS — categorise tests so you can run subsets
# ─────────────────────────────────────────────────────────────
# Usage:
#   pytest -m unit                  → fast unit tests only
#   pytest -m integration           → DB/HTTP tests only
#   pytest -m "not evaluation"      → everything except real LLM calls
#   pytest -m "unit or integration" → both
markers =
    unit: Fast isolated tests — no DB, no HTTP, no real LLM calls
    integration: Tests requiring a database or HTTP layer
    evaluation: Tests that call real LLM APIs — run separately, cost money

# ─────────────────────────────────────────────────────────────
# OUTPUT OPTIONS (uncomment to enable)
# ─────────────────────────────────────────────────────────────
# addopts = -v --tb=short
# addopts = -v --tb=short --cov=src --cov-report=term-missing
