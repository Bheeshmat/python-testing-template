name: CI/CD

# ── Triggers ────────────────────────────────────────────────────────────────
# Run on every push to any branch, and on every pull request targeting main.
# This means:
#   - pushing a feature branch runs CI immediately (fast feedback)
#   - opening/updating a PR runs CI again (required to pass before merge)
#   - merging to main triggers CI then deploys to staging then production
on:
  push:
    branches: ["**"]        # every branch
  pull_request:
    branches: [main]        # PRs targeting main only

# ── Jobs ────────────────────────────────────────────────────────────────────
jobs:
  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest  # fresh Ubuntu VM, destroyed after run

    steps:
      # ── Step 1: Check out your code ───────────────────────────────────────
      # Without this, the runner has no code to work with.
      # actions/checkout is a pre-built action from the GitHub marketplace.
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Install Python ────────────────────────────────────────────
      # The runner has Python pre-installed but we pin the exact version
      # to avoid "works on CI but not locally" issues.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Step 3: Cache dependencies ────────────────────────────────────────
      # Caching saves the installed packages between runs.
      # If requirements.txt hasn't changed, pip install is skipped entirely.
      # This takes CI from ~60s to ~10s on subsequent runs.
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Cache key: if requirements.txt changes, cache is invalidated
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Step 4: Install dependencies ─────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 5: Lint with ruff ────────────────────────────────────────────
      # ruff check: finds errors, unused imports, style violations
      # ruff format --check: verifies formatting without changing files
      #   (exits with error code if any file would be reformatted)
      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      # ── Step 6: Run tests ─────────────────────────────────────────────────
      # -v: verbose output (see each test name)
      # -m "not evaluation": skip tests marked @pytest.mark.evaluation
      #   (those call real LLM APIs — too slow and costly for CI)
      - name: Run tests
        env:
          # Provide a dummy key so imports don't fail.
          # Unit/integration tests mock the LLM — no real API calls are made.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-dummy-key-for-ci' }}
          SECRET_KEY: "ci-test-secret-key-not-used-in-production"
          ENVIRONMENT: "test"
        run: |
          pytest -v -m "not evaluation"

  # ── Staging Deployment ───────────────────────────────────────────────────
  # Runs automatically after CI passes, but ONLY on pushes to main.
  # PRs trigger CI only — not deployment.
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: backend-ci          # wait for CI to pass before deploying
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Links this job to the GitHub 'staging' environment.
    # This means:
    #   - secrets come from the staging environment (not repo-level secrets)
    #   - deployment is tracked under staging in GitHub
    environment:
      name: staging
      url: ${{ vars.APP_URL }}  # shown as a link in the GitHub UI after deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Deploy to Railway (staging) ──────────────────────────────────────
      # PLACEHOLDER: actual Railway deploy command added in Module 7.
      # The environment secret RAILWAY_TOKEN will authenticate the deploy.
      - name: Deploy to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ENVIRONMENT: staging
        run: |
          echo "Deploying to staging..."
          echo "RAILWAY_TOKEN is set: ${{ secrets.RAILWAY_TOKEN != '' }}"
          # TODO (Module 7): replace with real Railway deploy command:
          # npm install -g @railway/cli
          # railway up --service backend-staging

      # ── Smoke test ───────────────────────────────────────────────────────
      # A basic HTTP check that the deployed app is alive.
      # Catches cases where the app builds fine but crashes on startup
      # (e.g. missing env var, failed DB migration).
      - name: Smoke test staging
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          echo "Smoke testing staging..."
          # TODO (Module 7): uncomment once Railway URL is configured:
          # curl --fail --retry 3 --retry-delay 5 $APP_URL/health

  # ── Production Deployment ────────────────────────────────────────────────
  # Runs after staging deploy succeeds.
  # The 'production' GitHub environment has a required reviewer (you) —
  # GitHub will pause here and send you an email asking for approval.
  # Nothing deploys to production until you click Approve.
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: deploy-staging      # wait for staging to succeed first

    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ENVIRONMENT: production
        run: |
          echo "Deploying to production..."
          echo "RAILWAY_TOKEN is set: ${{ secrets.RAILWAY_TOKEN != '' }}"
          # TODO (Module 7): replace with real Railway deploy command:
          # npm install -g @railway/cli
          # railway up --service backend-production

      - name: Smoke test production
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          echo "Smoke testing production..."
          # TODO (Module 7): uncomment once Railway URL is configured:
          # curl --fail --retry 3 --retry-delay 5 $APP_URL/health
