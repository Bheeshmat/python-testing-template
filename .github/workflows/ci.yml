name: CI/CD

# ── Triggers ────────────────────────────────────────────────────────────────
# Run on every push to any branch, and on every pull request targeting main.
# This means:
#   - pushing a feature branch runs CI immediately (fast feedback)
#   - opening/updating a PR runs CI again (required to pass before merge)
#   - merging to main triggers CI then deploys to staging then production
on:
  push:
    branches: ["**"]        # every branch
  pull_request:
    branches: [main]        # PRs targeting main only

# ── Jobs ────────────────────────────────────────────────────────────────────
jobs:
  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest  # fresh Ubuntu VM, destroyed after run

    steps:
      # ── Step 1: Check out your code ───────────────────────────────────────
      # Without this, the runner has no code to work with.
      # actions/checkout is a pre-built action from the GitHub marketplace.
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Install Python ────────────────────────────────────────────
      # The runner has Python pre-installed but we pin the exact version
      # to avoid "works on CI but not locally" issues.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Step 3: Cache dependencies ────────────────────────────────────────
      # Caching saves the installed packages between runs.
      # If requirements.txt hasn't changed, pip install is skipped entirely.
      # This takes CI from ~60s to ~10s on subsequent runs.
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Cache key: if requirements.txt changes, cache is invalidated
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Step 4: Install dependencies ─────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 5: Lint with ruff ────────────────────────────────────────────
      # ruff check: finds errors, unused imports, style violations
      # ruff format --check: verifies formatting without changing files
      #   (exits with error code if any file would be reformatted)
      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      # ── Step 6: Run tests ─────────────────────────────────────────────────
      # -v: verbose output (see each test name)
      # -m "not evaluation": skip tests marked @pytest.mark.evaluation
      #   (those call real LLM APIs — too slow and costly for CI)
      - name: Run tests
        env:
          # Provide a dummy key so imports don't fail.
          # Unit/integration tests mock the LLM — no real API calls are made.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-dummy-key-for-ci' }}
          SECRET_KEY: "ci-test-secret-key-not-used-in-production"
          ENVIRONMENT: "test"
        run: |
          pytest -v -m "not evaluation"

  # ── Staging Deployment ───────────────────────────────────────────────────
  # Railway auto-deploys staging when all CI checks pass (Wait for CI = ON).
  # This job does NOT trigger the deploy — Railway does that natively.
  # This job's purpose: wait for Railway to finish, then smoke test.
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: backend-ci          # wait for CI to pass before running this job
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: staging
      url: https://python-testing-template-staging.up.railway.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Deploy to Railway (staging) ───────────────────────────────────────
      # Railway CLI deploys the current code to the staging environment.
      # Without --detach: CLI waits for deploy to complete before exiting.
      # This ensures the smoke test runs against the NEW version.
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service python-testing-template \
            --environment staging

      # ── Smoke test ───────────────────────────────────────────────────────
      # railway up waits for deploy to complete so no sleep needed.
      # Retries handle any brief startup delay after new container starts.
      - name: Smoke test staging
        run: |
          curl --fail \
               --retry 10 \
               --retry-delay 15 \
               --retry-all-errors \
               https://python-testing-template-staging.up.railway.app/health
          echo "✓ Staging is live and healthy"

  # ── Production Deployment ────────────────────────────────────────────────
  # Runs after staging smoke test passes.
  # The 'production' GitHub environment has a required reviewer (you) —
  # GitHub pauses here and sends an approval request before running this job.
  # Nothing deploys to production until you click Approve in GitHub UI.
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: deploy-staging      # wait for staging smoke test to pass first

    environment:
      name: production
      url: https://python-testing-template-production.up.railway.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Deploy to Railway (production) ───────────────────────────────────
      # Unlike staging, production has its GitHub branch disconnected.
      # Railway will NOT auto-deploy production — we trigger it explicitly here.
      # railway up: builds Docker image on Railway and deploys it.
      # Without --detach: CLI waits for deploy to complete before exiting.
      #   This ensures smoke test runs against the NEW version, not the old one.
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service python-testing-template \
            --environment production

      # ── Smoke test ───────────────────────────────────────────────────────
      # railway up waits for deploy to complete, so no sleep needed here.
      # Retries handle any brief startup delay after the new container starts.
      - name: Smoke test production
        run: |
          curl --fail \
               --retry 10 \
               --retry-delay 15 \
               --retry-all-errors \
               https://python-testing-template-production.up.railway.app/health
          echo "✓ Production is live and healthy"
