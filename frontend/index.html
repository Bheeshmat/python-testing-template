<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
      h1 { margin-bottom: 20px; }
      h2 { margin: 20px 0 10px; }
      input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100%; margin-bottom: 8px; }
      button { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
      button:hover { background: #4338ca; }
      .error { color: #dc2626; margin: 8px 0; }
      .health { padding: 8px 12px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; }
      .health.ok { background: #dcfce7; color: #166534; }
      .health.err { background: #fee2e2; color: #991b1b; }
      .task { padding: 10px; border: 1px solid #e5e7eb; border-radius: 4px; margin-bottom: 6px; }
      .task-status { font-size: 12px; color: #6b7280; }
      .logout { background: #6b7280; margin-left: 10px; }
      form { margin-bottom: 16px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
